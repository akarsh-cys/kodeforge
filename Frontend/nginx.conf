server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy /api to backend if you want to avoid CORS but keep it simple with localhost:4001 for now
    # location /api {
    #     proxy_pass http://backend:4001;
    # }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
